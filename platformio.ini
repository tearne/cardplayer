[env:cardplayer]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38/platform-espressif32.zip
board = m5stack-stamps3
framework = arduino

lib_deps =
    m5stack/M5Cardputer@^1.1.1
    earlephilhower/ESP8266Audio@^1.9.9
    kosme/arduinoFFT@^2.0.4

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

# Framework rebuild overrides:
#   CONFIG_FREERTOS_USE_TRACE_FACILITY — calibration-free per-core CPU
#     readouts in the diagnostics row.
#   CONFIG_ESP_IPC_TASK_STACK_SIZE — bumped from the framework default
#     1024 to 4096. ESP-IDF's IPC task stack on core 1 was peaking at
#     ~976 bytes during boot (M5Cardputer GPIO ISR registration); we sized
#     to 2048 in May, but the peak crept past that as static-RAM additions
#     reshaped the heap layout the system allocator walks during boot-time
#     ISR install. 4096 gives ample headroom; the runtime probe in setup()
#     reports current ipc0/ipc1 high-water marks so future creep is visible
#     before it becomes a canary panic on boot.
custom_sdkconfig =
    CONFIG_FREERTOS_USE_TRACE_FACILITY=y
    CONFIG_ESP_IPC_TASK_STACK_SIZE=4096

monitor_speed = 115200

# Re-apply the __wrap_log_printf patch before every build, since
# framework reinstalls (triggered by sdkconfig changes) would otherwise
# wipe the manual edit. Idempotent — script skips if already present.
extra_scripts =
    pre:scripts/patch_log_wrapper.py
    pre:scripts/exclude_esp8266audio_http.py

# Investigation build: regular firmware + fuzzy-track-finding serial harness.
# Boots the normal UI/audio paths, additionally listens on USB serial for
# `help`, `gen`, `build`, `q`, `bench`, etc. Not user-facing — pick this env
# only when measuring fuzzy-finder feasibility on device.
[env:cardputer-fuzzy]
extends = env:cardplayer
build_flags =
    ${env:cardplayer.build_flags}
    -DFUZZY_HARNESS=1
monitor_echo = yes
monitor_filters = esp32_exception_decoder

[env:cardputer-adv]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38/platform-espressif32.zip
board = m5stack-stamps3
framework = arduino

lib_deps =
    m5stack/M5Cardputer@^1.1.1
    https://github.com/pschatzmann/arduino-audio-tools.git#v1.2.2
    https://github.com/pschatzmann/arduino-libhelix.git
    https://github.com/pschatzmann/arduino-libfoxenflac.git

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

# Pin the Arduino loop task to core 0 via sdkconfig rather than -D
# build flag. Setting it as -DARDUINO_RUNNING_CORE=0 collides with the
# framework's own =1 definition during a custom-sdkconfig framework
# rebuild (we hit `<command-line>: error: "ARDUINO_RUNNING_CORE"
# redefined`). The sdkconfig path side-steps the duplicate-define.
custom_sdkconfig =
    CONFIG_ARDUINO_RUNNING_CORE=0
    CONFIG_FREERTOS_USE_TRACE_FACILITY=y

monitor_speed = 115200

# Re-apply the __wrap_log_printf patch before every build, since
# framework reinstalls (triggered by sdkconfig changes) would otherwise
# wipe the manual edit. Idempotent — script skips if already present.
extra_scripts =
    pre:scripts/patch_log_wrapper.py

# Measurement-only environment evaluating ESP32-audioI2S as a possible
# replacement for arduino-audio-tools. Builds a stripped main from
# eval/audioi2s/ that plays a hard-coded reference file and logs heap
# evolution. The production cardputer-adv build above is untouched.
[env:eval-audioi2s]
extends = env:cardputer-adv
lib_deps =
    m5stack/M5Cardputer@^1.1.1
    https://github.com/schreibfaul1/ESP32-audioI2S.git
build_src_filter =
    -<*>
    +<../eval/audioi2s/>
build_flags =
    ${env:cardputer-adv.build_flags}
    -DEVAL_AUDIOI2S=1
    -DCORE_DEBUG_LEVEL=0
